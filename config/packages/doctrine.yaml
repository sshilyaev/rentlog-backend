doctrine:
  dbal:
    url: '%env(resolve:DATABASE_URL)%'
  orm:
    validate_xml_mapping: true
    naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
    auto_mapping: false
    mappings:
      Auth:
        is_bundle: false
        type: attribute
        dir: '%kernel.project_dir%/src/Auth/Domain/Entity'
        prefix: App\Auth\Domain\Entity
        alias: Auth
      Property:
        is_bundle: false
        type: attribute
        dir: '%kernel.project_dir%/src/Property/Domain/Entity'
        prefix: App\Property\Domain\Entity
        alias: Property
      Rent:
        is_bundle: false
        type: attribute
        dir: '%kernel.project_dir%/src/Rent/Domain/Entity'
        prefix: App\Rent\Domain\Entity
        alias: Rent
      Billing:
        is_bundle: false
        type: attribute
        dir: '%kernel.project_dir%/src/Billing/Domain/Entity'
        prefix: App\Billing\Domain\Entity
        alias: Billing
