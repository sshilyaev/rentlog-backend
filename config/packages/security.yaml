security:
  password_hashers:
    App\Auth\Domain\Entity\User:
      algorithm: auto
  providers:
    app_user_provider:
      entity:
        class: App\Auth\Domain\Entity\User
        property: email
    profiler_basic_user:
      memory:
        users:
          profiler:
            password: '%env(PROFILER_HTTP_PASSWORD)%'
            roles:
              - ROLE_PROFILER_ACCESS
  firewalls:
    dev_profiler_public:
      request_matcher: App\Shared\Infrastructure\Security\DevProfilerAssetsRequestMatcher
      security: false
    prod_profiler_bundles:
      request_matcher: App\Shared\Infrastructure\Security\ProdWebProfilerAssetsRequestMatcher
      security: false
    prod_profiler_tools:
      request_matcher: App\Shared\Infrastructure\Security\ProdWebProfilerToolsRequestMatcher
      lazy: true
      stateless: true
      http_basic:
        realm: Web Profiler
      provider: profiler_basic_user
    login:
      pattern: '^/api/v1/auth/login/?$'
      stateless: true
      provider: app_user_provider
      json_login:
        check_path: /api/v1/auth/login
        username_path: email
        password_path: password
        success_handler: App\Auth\Presentation\Security\LoginSuccessHandler
        failure_handler: App\Auth\Presentation\Security\LoginFailureHandler
    login_root:
      pattern: '^/auth/login/?$'
      stateless: true
      provider: app_user_provider
      json_login:
        check_path: /auth/login
        username_path: email
        password_path: password
        success_handler: App\Auth\Presentation\Security\LoginSuccessHandler
        failure_handler: App\Auth\Presentation\Security\LoginFailureHandler
    api:
      pattern: ^/api/v1
      stateless: true
      provider: app_user_provider
      jwt: null
    admin:
      pattern: ^/admin
      lazy: true
      provider: app_user_provider
      form_login:
        login_path: admin_login
        check_path: admin_login
        enable_csrf: true
        default_target_path: /admin
        always_use_default_target_path: true
      logout:
        path: /admin/logout
        target: admin_login
  access_control:
    -
      path: ^/api/v1/health
      roles: PUBLIC_ACCESS
    -
      path: ^/api/v1/auth/register
      roles: PUBLIC_ACCESS
    -
      path: '^/api/v1/auth/login/?$'
      roles: PUBLIC_ACCESS
    -
      path: '^/auth/login/?$'
      roles: PUBLIC_ACCESS
    -
      path: ^/api/v1/docs
      roles: PUBLIC_ACCESS
    -
      path: ^/api/v1
      roles: IS_AUTHENTICATED_FULLY
    -
      path: ^/admin/login
      roles: PUBLIC_ACCESS
    -
      path: ^/admin
      roles: ROLE_ADMIN
