security:
  password_hashers:
    App\Auth\Domain\Entity\User:
      algorithm: auto

  providers:
    app_user_provider:
      entity:
        class: App\Auth\Domain\Entity\User
        property: email

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    login:
      pattern: ^/api/v1/auth/login
      stateless: true
      json_login:
        check_path: /api/v1/auth/login
        username_path: email
        password_path: password
        success_handler: lexik_jwt_authentication.handler.authentication_success
        failure_handler: lexik_jwt_authentication.handler.authentication_failure

    api:
      pattern: ^/api/v1
      stateless: true
      jwt: ~

  access_control:
    - { path: ^/api/v1/health, roles: PUBLIC_ACCESS }
    - { path: ^/api/v1/auth/register, roles: PUBLIC_ACCESS }
    - { path: ^/api/v1/auth/login, roles: PUBLIC_ACCESS }
    - { path: ^/api/v1/docs, roles: PUBLIC_ACCESS }
    - { path: ^/api/v1, roles: IS_AUTHENTICATED_FULLY }
