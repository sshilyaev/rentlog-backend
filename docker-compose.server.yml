services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: rentlog_backend_php
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      DATABASE_URL: '${DATABASE_URL}'
      REDIS_URL: '${REDIS_URL}'
      JWT_SECRET_KEY: /var/www/html/config/jwt/private.pem
      JWT_PUBLIC_KEY: /var/www/html/config/jwt/public.pem
      JWT_PASSPHRASE: '${JWT_PASSPHRASE:-}'
      WEB_PROFILER_ENABLED: '${WEB_PROFILER_ENABLED:-0}'
      PROFILER_HTTP_PASSWORD: '${PROFILER_HTTP_PASSWORD:-}'
      DEFAULT_ADMIN_EMAIL: '${DEFAULT_ADMIN_EMAIL:-}'
      DEFAULT_ADMIN_PASSWORD: '${DEFAULT_ADMIN_PASSWORD:-}'
      DEFAULT_ADMIN_FULL_NAME: '${DEFAULT_ADMIN_FULL_NAME:-Administrator}'
    depends_on:
      - postgres
      - redis
    volumes:
      - './config/jwt:/var/www/html/config/jwt:ro'
  nginx:
    image: 'nginx:1.27-alpine'
    container_name: rentlog_backend_nginx
    restart: unless-stopped
    depends_on:
      - php
    ports:
      - '8080:80'
    volumes:
      - './:/var/www/html:ro'
      - './docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro'
  postgres:
    image: 'postgres:17-alpine'
    container_name: rentlog_backend_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: '${POSTGRES_DB}'
      POSTGRES_USER: '${POSTGRES_USER}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'
  redis:
    image: 'redis:7-alpine'
    container_name: rentlog_backend_redis
    restart: unless-stopped
    volumes:
      - 'redis_data:/data'
volumes:
  postgres_data: null
  redis_data: null
