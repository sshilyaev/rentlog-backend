# Paste into the host nginx site that terminates TLS for rent.tallybase.ru.
# Backend: docker-compose.server.yml exposes app on 127.0.0.1:8080
#
# Without a single `location /` (or explicit locations for /_profiler, /_wdt,
# /bundles) the profiler returns 404 from nginx before Symfony.

upstream rentlog_backend {
    server 127.0.0.1:8080;
}

server {
    listen 443 ssl http2;
    server_name rent.tallybase.ru;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    location / {
        proxy_pass http://rentlog_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}
