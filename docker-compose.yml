services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rentlog_backend_php
    working_dir: /var/www/html
    volumes:
      - './:/var/www/html'
    environment:
      APP_ENV: dev
      DATABASE_URL: 'postgresql://rentlog:rentlog@postgres:5432/rentlog?serverVersion=17&charset=utf8'
      REDIS_URL: 'redis://redis:6379'
    depends_on:
      - postgres
      - redis
  nginx:
    image: 'nginx:1.27-alpine'
    container_name: rentlog_backend_nginx
    ports:
      - '8080:80'
    volumes:
      - './:/var/www/html'
      - './docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro'
    depends_on:
      - php
  postgres:
    image: 'postgres:17-alpine'
    container_name: rentlog_backend_postgres
    environment:
      POSTGRES_DB: rentlog
      POSTGRES_USER: rentlog
      POSTGRES_PASSWORD: rentlog
    ports:
      - '5432:5432'
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'
  redis:
    image: 'redis:7-alpine'
    container_name: rentlog_backend_redis
    ports:
      - '6379:6379'
    volumes:
      - 'redis_data:/data'
  database:
    image: 'postgres:${POSTGRES_VERSION:-16}-alpine'
    environment:
      POSTGRES_DB: '${POSTGRES_DB:-app}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-!ChangeMe!}'
      POSTGRES_USER: '${POSTGRES_USER:-app}'
    healthcheck:
      test:
        - CMD
        - pg_isready
        - '-d'
        - '${POSTGRES_DB:-app}'
        - '-U'
        - '${POSTGRES_USER:-app}'
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - 'database_data:/var/lib/postgresql/data:rw'
volumes:
  postgres_data: null
  redis_data: null
  database_data: null
