services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rentlog_backend_php
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql://rentlog:rentlog@postgres:5432/rentlog?serverVersion=17&charset=utf8
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: rentlog_backend_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  postgres:
    image: postgres:17-alpine
    container_name: rentlog_backend_postgres
    environment:
      POSTGRES_DB: rentlog
      POSTGRES_USER: rentlog
      POSTGRES_PASSWORD: rentlog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rentlog_backend_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
